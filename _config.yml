# ==============================================================================
# JEKYLL FILE READING & STRUCTURE CONFIGURATION
# ==============================================================================
# This block manages how Jekyll reads, includes, and excludes files and folders 
# during the site compilation process.
#
# SOURCE ATTRIBUTION:
# This file configuration and repository structure have been adapted from the 
# academic website template created by Xianyu Yang.
# Original repository: https://github.com/Xianyu-Yang/xianyu-yang.github.io.git
# ==============================================================================

# Site Settings
title: "Chiara Mansi - PhD student at the University of Tuscia"
description: "Living in harmony with Nature."
url: "https://chiaramansi.github.io"
repository: "chiaramansi/chiaramansi.github.io"
google_scholar_stats_use_cdn: true

# google analytics
#google_analytics_id: # get google_analytics_id from https://analytics.google.com/analytics/

# SEO Related
#google_site_verification: # get google_site_verification from https://search.google.com/search-console/about
#bing_site_verification: # get bing_site_verification from https://www.bing.com/webmasters/about
#baidu_site_verification: # get baidu_site_verification from https://ziyuan.baidu.com/login/index?u=/site/index

# Site Author
author:
  name: "Chiara Mansi"
  avatar: "/assets/avatar.jpg"
  bio: "PhD project 'Evaluating the Protected Areas Management Effectiveness through remote and proximal sensing'"
  location: "Viterbo, Italy"
  employer: "University of Tuscia"
  pubmed: 
  googlescholar: "https://scholar.google.com/citations?hl=it&user=_F51acAAAAAJ"
  email: "chiara.mansi@unitus.it"
  researchgate: "https://www.researchgate.net/profile/Chiara-Mansi-3"
  uri: 
  bitbucket: 
  codepen: 
  dribbble: 
  flickr: 
  facebook: 
  foursquare: 
  github: "chiaramansi"
  google_plus: 
  keybase: 
  instagram: 
  impactstory: 
  lastfm: 
  linkedin: 
  dblp: 
  orcid: "https://orcid.org/0000-0003-0333-8261"
  pinterest: 
  soundcloud: 
  stackoverflow: 
  steam: 
  tumblr: 
  twitter: 
  vine: 
  weibo: 
  xing: 
  youtube: 
  wikipedia: 

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Outputting
permalink: /:categories/:title/
timezone: Europe/Rome

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# HTML Compression
# - http://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development


